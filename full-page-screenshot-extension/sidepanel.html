<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      text-align: center;
      color: #00d4ff;
    }
    button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btnFull { background: #00d4ff; color: #1a1a2e; }
    #btnVisible { background: #444; color: #eee; }
    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      color: #aaa;
      min-height: 20px;
    }
    #progress {
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin-top: 8px;
      display: none;
    }
    #bar {
      height: 100%;
      background: #00d4ff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <h3>Screenshot</h3>
  <button id="btnFull">Pagina Intera</button>
  <button id="btnVisible">Solo Visibile</button>
  <div id="status"></div>
  <div id="progress"><div id="bar"></div></div>
  <script src="sidepanel.js"></script>
</body>
</html>
