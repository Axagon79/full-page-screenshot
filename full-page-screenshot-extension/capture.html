<!DOCTYPE html>
<html>
<head>
  <title>Cattura in corso...</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h2 { color: #00d4ff; }
    #status { font-size: 18px; margin: 20px 0; }
    #progress {
      width: 300px;
      height: 6px;
      background: #333;
      border-radius: 3px;
    }
    #bar {
      height: 100%;
      background: #00d4ff;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }
    #done { display: none; color: #10b981; font-size: 20px; margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Screenshot Pagina Intera</h2>
  <div id="status">Preparazione...</div>
  <div id="progress"><div id="bar"></div></div>
  <div id="done">Salvato! Puoi chiudere questa tab.</div>
  <script src="capture.js"></script>
</body>
</html>
